<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة التقدير النهائي - UOBKMC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #05080f;
    --bg-panel: #0b1220;
    --bg-panel-2: #101b2e;
    --ink: #eef1fa;
    --muted: #7c8bab;
    --blue: #4a6fe3;
    --blue-soft: rgba(74,111,227,0.16);
    --gold: #d4af37;
    --gold-soft: rgba(212,175,55,0.14);
    --line: rgba(255,255,255,0.08);
  }

  * { box-sizing: border-box; }

  body {
    font-family: "Tajawal", sans-serif;
    background:
      radial-gradient(ellipse at 50% -10%, #10203f 0%, var(--bg-deep) 55%);
    margin: 0;
    padding: 32px 16px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: var(--ink);
  }

  /* ---------- Header ---------- */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 8px;
    width: 100%;
    max-width: 420px;
  }
  .logo {
    width: auto;
    max-width: 190px;
    height: auto;
    margin-bottom: 6px;
  }
  h1 {
    font-family: "Cairo", sans-serif;
    font-weight: 800;
    text-align: center;
    font-size: 1.55rem;
    margin: 0;
    color: #fff;
    letter-spacing: 0.2px;
  }
  .eyebrow {
    color: var(--gold);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 3px;
    margin-top: 8px;
    text-transform: uppercase;
    font-family: "Tajawal", sans-serif;
    direction: ltr;
  }

  /* DNA-helix signature divider */
  .helix {
    width: 100%;
    max-width: 260px;
    height: 26px;
    margin: 18px 0 26px;
  }
  .helix path {
    fill: none;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-dasharray: 340;
    stroke-dashoffset: 340;
    animation: draw 1.6s ease-out forwards;
  }
  .helix .strand-a { stroke: var(--blue); animation-delay: 0.1s; }
  .helix .strand-b { stroke: var(--gold); animation-delay: 0.35s; }
  .helix line {
    stroke: rgba(255,255,255,0.22);
    stroke-width: 1;
    opacity: 0;
    animation: fadeIn 0.6s ease-out forwards;
    animation-delay: 1.2s;
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes fadeIn { to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) {
    .helix path { animation: none; stroke-dashoffset: 0; }
    .helix line { animation: none; opacity: 1; }
  }

  /* ---------- Subject list (flex rows, guaranteed to fit any screen) ---------- */
  .list-wrap {
    width: 100%;
    max-width: 700px;
    background: linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid var(--line);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  .list-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--line);
  }
  .list-header span {
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .col-subject { flex: 1 1 auto; text-align: center; }
  .col-credit { flex: 0 0 44px; text-align: center; }
  .col-score  { flex: 0 0 78px; text-align: center; }

  .subject-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 13px 14px;
    border-top: 1px solid var(--line);
    transition: background 0.15s ease;
  }
  .subject-row:first-child { border-top: none; }
  .subject-row:hover { background: rgba(255,255,255,0.02); }

  .subject-name {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-weight: 500;
    font-size: 0.96rem;
    color: var(--ink);
    overflow-wrap: break-word;
  }
  .credit-pill {
    flex: 0 0 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 26px;
    border-radius: 999px;
    background: var(--gold-soft);
    color: var(--gold);
    font-size: 0.82rem;
    font-weight: 700;
  }

  input.score-input {
    flex: 0 0 70px;
    width: 70px;
    padding: 8px 4px;
    border: none;
    border-bottom: 2px solid rgba(255,255,255,0.15);
    border-radius: 0;
    background: transparent;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    transition: border-color 0.2s ease;
  }
  input.score-input:focus {
    outline: none;
    border-bottom-color: var(--blue);
  }
  input.score-input::-webkit-outer-spin-button,
  input.score-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input.score-input::placeholder { color: #4d5b7d; }

  /* ---------- Button ---------- */
  .calc-btn {
    margin-top: 30px;
    background: linear-gradient(135deg, var(--blue), #2f4bb0);
    color: #fff;
    border: none;
    padding: 16px 46px;
    font-family: "Tajawal", sans-serif;
    font-size: 1.02rem;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(74,111,227,0.35);
    letter-spacing: 0.3px;
  }
  .calc-btn:hover { filter: brightness(1.08); }
  .calc-btn:active { transform: translateY(1px); }

  /* ---------- Result panel ---------- */
  .result-panel {
    margin-top: 26px;
    width: 100%;
    max-width: 700px;
    background: linear-gradient(180deg, var(--bg-panel-2), var(--bg-panel));
    border: 1px solid var(--line);
    border-top: 2px solid var(--gold);
    border-radius: 16px;
    padding: 22px 18px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  }
  .stat {
    flex: 1 1 140px;
    text-align: center;
    padding: 10px 8px;
  }
  .stat + .stat { border-right: 1px solid var(--line); }
  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: "Cairo", sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    color: #fff;
  }
  .stat-value.accent { color: var(--gold); }

  .placeholder-msg {
    width: 100%;
    text-align: center;
    color: var(--muted);
    font-size: 0.95rem;
  }

  .footer-tag {
    margin-top: 34px;
    color: #445068;
    font-size: 0.75rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    direction: ltr;
  }
</style>
</head>

<div class="list-wrap">
  <div class="list-header">
    <span class="col-credit">الكردت</span>
    <span class="col-score">الدرجة</span>
    <span class="col-subject">المادة</span>
  </div>
  <div id="tableBody">
    <!-- rows injected by JS -->
  </div>
</div>

<button class="calc-btn" onclick="calculateFinal()">احسب التقدير النهائي</button>

<div class="result-panel" id="resultPanel">
  <div class="placeholder-msg" id="placeholderMsg">النتيجة ستظهر هنا بعد إدخال الدرجات</div>
</div>

<div class="footer-tag">UOBKMC · Batch 27</div>

<script>
  // Subjects with credit hours (electives and physical/art education removed)
  const subjects = [
    { ar: "HSD", credits: 5 },
    { ar: "Anatomy", credits: 4 },
    { ar: "Medical Physics", credits: 3 },
    { ar: "Human Cell & Gene", credits: 3 },
    { ar: "Biochemistry", credits: 3 },
    { ar: "Physiology", credits: 3 },
    { ar: "Microbiology", credits: 3 },
    { ar: "Foundation of Medicine", credits: 2 },
    { ar: "Human Rights", credits: 2 },
    { ar: "Concept of Health & Disease", credits: 2 },
    { ar: "Basic Computer", credits: 2 },
    { ar: "Arabic 1", credits: 1 },
    { ar: "Arabic 2", credits: 1 },
    { ar: "Medical Terminology 1", credits: 1 },
    { ar: "Medical Terminology 2", credits: 1 },
  ];

  const tbody = document.getElementById("tableBody");

  subjects.forEach((subj, idx) => {
    const row = document.createElement("div");
    row.className = "subject-row";
    const inputId = `score_${idx}`;

    row.innerHTML = `
      <div class="credit-pill">${subj.credits}</div>
      <input type="number" class="score-input" id="${inputId}" min="0" max="100" step="0.5" placeholder="—" data-weight="${subj.credits}">
      <div class="subject-name">${subj.ar}</div>
    `;
    tbody.appendChild(row);
  });

  // Percentage ranges used to map the final average back to a letter grade
  const gradeRanges = [
    { min: 90, label: "امتياز" },
    { min: 80, label: "جيد جدا" },
    { min: 70, label: "جيد" },
    { min: 60, label: "متوسط" },
    { min: 50, label: "مقبول" },
    { min: 0,  label: "ضعيف" },
  ];

  function percentageToGrade(pct) {
    for (const r of gradeRanges) {
      if (pct >= r.min) return r.label;
    }
    return "ضعيف";
  }

  function calculateFinal() {
    const inputs = document.querySelectorAll(".score-input");
    let weightedSum = 0;
    let weightSum = 0;
    let hasEmpty = false;

    inputs.forEach(inp => {
      const weight = parseFloat(inp.dataset.weight);
      const value = parseFloat(inp.value);
      if (isNaN(value)) {
        hasEmpty = true;
        return;
      }
      weightedSum += weight * value;
      weightSum += weight;
    });

    const panel = document.getElementById("resultPanel");

    if (hasEmpty || weightSum === 0) {
      panel.innerHTML = `<div class="placeholder-msg">أدخل درجات كل المواد أولاً</div>`;
      return;
    }

    const percentage = weightedSum / weightSum;
    const outOf5 = (percentage / 100) * 5;
    const gradeLabel = percentageToGrade(percentage);

    panel.innerHTML = `
      <div class="stat">
        <div class="stat-label">من 100</div>
        <div class="stat-value">${percentage.toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">التقدير</div>
        <div class="stat-value accent">${gradeLabel}</div>
      </div>
      <div class="stat">
        <div class="stat-label">من 5</div>
        <div class="stat-value">${outOf5.toFixed(2)}</div>
      </div>
    `;
  }
</script>
